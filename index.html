<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给索晓茹的生日惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }

        /* 入口页面 */
        #entry-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 100;
            transition: opacity 1s ease, transform 1s ease;
        }

        #entry-page.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .entry-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .open-btn {
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.6);
        }

        .open-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .open-btn:hover::before {
            left: 100%;
        }

        /* 惊喜页面 */
        #surprise-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #1a0a2e 70%, #0d0015 100%);
            z-index: 50;
        }

        #surprise-page.show {
            display: flex;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 飘落的心形 */
        .heart {
            position: absolute;
            color: #ff6b9d;
            font-size: 1.5rem;
            animation: fall linear infinite;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.8);
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 星星 */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 主内容区 */
        .content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        .greeting {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255, 182, 193, 0.8);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 182, 193, 0.6); }
            to { text-shadow: 0 0 40px rgba(255, 182, 193, 1), 0 0 60px rgba(255, 182, 193, 0.5); }
        }

        .name {
            font-size: 4rem;
            background: linear-gradient(45deg, #ff6b9d, #ffd700, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 3s ease infinite;
            margin: 1rem 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .date-info {
            font-size: 1.3rem;
            color: #b8c5d6;
            margin: 1.5rem 0;
        }

        .distance {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            font-size: 1.2rem;
            color: #e8d5eb;
        }

        .city {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 107, 157, 0.2);
            border: 1px solid rgba(255, 107, 157, 0.4);
            border-radius: 25px;
        }

        .heart-line {
            color: #ff6b9d;
            font-size: 1.5rem;
            animation: heartbeat 1s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .message {
            font-size: 1.4rem;
            color: #e0d4f5;
            max-width: 600px;
            line-height: 2;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 1s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message2 {
            font-size: 1.3rem;
            color: #ffd700;
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 2s;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* 回忆按钮 */
        .memory-btn {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #9b59b6, #e74c8c);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(155, 89, 182, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 2.5s;
        }

        .memory-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(155, 89, 182, 0.6);
        }

        /* 照片轮播模态框 */
        .carousel-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .carousel-modal.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .carousel-title {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8);
        }

        .carousel-container {
            position: relative;
            width: 80%;
            max-width: 800px;
            aspect-ratio: 4/3;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 107, 157, 0.3);
        }

        .carousel-slide {
            display: none;
            width: 100%;
            height: 100%;
            animation: slideIn 0.5s ease;
        }

        .carousel-slide.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 107, 157, 0.8);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-nav:hover {
            background: rgba(255, 107, 157, 1);
            transform: translateY(-50%) scale(1.1);
        }

        .carousel-prev {
            left: 10px;
        }

        .carousel-next {
            right: 10px;
        }

        .carousel-dots {
            display: flex;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-dot.active {
            background: #ff6b9d;
            transform: scale(1.3);
        }

        .carousel-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .carousel-close:hover {
            color: #ff6b9d;
            transform: rotate(90deg);
        }

        .carousel-counter {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-top: 1rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .greeting {
                font-size: 2rem;
            }
            .name {
                font-size: 2.5rem;
            }
            .message {
                font-size: 1.1rem;
                padding: 0 1rem;
            }
            .entry-title {
                font-size: 1.8rem;
            }
            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }
            .memory-btn, .letter-btn {
                margin-left: 0;
                margin-top: 0;
                padding: 0.8rem 1.8rem;
                font-size: 1rem;
            }
        }

        /* 在一起计时器 */
        .timer {
            font-size: 1.3rem;
            color: #ffd700;
            margin: 1.5rem 0;
            padding: 1rem 2rem;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 1.5s;
            opacity: 0;
        }

        /* 情话轮播 */
        .love-quotes {
            margin-top: 2rem;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .quote-text {
            font-size: 1.2rem;
            color: #fff;
            padding: 1.5rem;
            background: rgba(255, 107, 157, 0.15);
            border-radius: 20px;
            border: 1px solid rgba(255, 107, 157, 0.3);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.8;
            opacity: 0;
            animation: quoteFade 1s ease forwards;
        }

        @keyframes quoteFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quote-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .quote-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quote-dot.active {
            background: #ff6b9d;
            transform: scale(1.3);
        }

        /* 情书按钮 */
        .letter-btn {
            margin-top: 2rem;
            margin-left: 1rem;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(231, 76, 140, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 2.5s;
        }

        .letter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(231, 76, 140, 0.6);
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* 情书模态框 */
        .letter-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .letter-modal.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .letter-content {
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
            padding: 3rem;
            border-radius: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 107, 157, 0.3);
            box-shadow: 0 0 50px rgba(255, 107, 157, 0.2);
            position: relative;
        }

        .letter-title {
            color: #ff6b9d;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
        }

        .letter-text {
            color: #e8d5eb;
            line-height: 2.4;
            font-size: 1.1rem;
            white-space: pre-wrap;
            text-align: justify;
        }

        .letter-text::first-letter {
            font-size: 1.4em;
            font-weight: bold;
            color: #ff6b9d;
        }

        .letter-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #ff6b9d;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .letter-close:hover {
            transform: rotate(90deg);
            color: #fff;
        }

    </style>
</head>
<body>
    <!-- 入口页面 -->
    <div id="entry-page">
        <h1 class="entry-title">亲爱的宝贝儿</h1>

        <!-- 模糊图片区域 -->
        <div id="photo-container" style="display: none; margin-bottom: 1rem; text-align: center;">
            <img id="mystery-photo" src="丑照.jpg" alt="神秘照片"
                 style="max-width: 5%; max-height: 250px; border-radius: 15px;
                        box-shadow: 0 8px 32px rgba(255, 107, 157, 0.4);
                        filter: blur(15px); cursor: pointer; transition: all 0.5s ease;"
                 onclick="zoomPhoto()">
            <div id="zoom-hint" style="color: rgba(255,255,255,0.6); margin-top: 1rem; font-size: 1rem;">
                太模糊了？点击变清楚
            </div>
        </div>

        <!-- 满意度询问弹窗 -->
        <div id="satisfaction-modal" style="display: none; margin-top: 1rem; text-align: center;">
            <div style="background: linear-gradient(135deg, #2d1b4e, #1a0a2e); padding: 1.5rem 2rem; border-radius: 15px; display: inline-block; border: 1px solid rgba(255,107,157,0.3); box-shadow: 0 0 30px rgba(255,107,157,0.3);">
                <div style="color: #fff; font-size: 1.2rem; margin-bottom: 1rem;">对这个惊喜你满意吗？</div>
                <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                    <button onclick="answerSatisfaction(true)" style="padding: 0.6rem 1.5rem; font-size: 1rem; background: linear-gradient(45deg, #ff6b9d, #c44569); color: white; border: none; border-radius: 20px; cursor: pointer; transition: all 0.3s ease;">我很满意</button>
                    <button onclick="answerSatisfaction(false)" style="padding: 0.6rem 1.5rem; font-size: 1rem; background: linear-gradient(45deg, #9b59b6, #e74c8c); color: white; border: none; border-radius: 20px; cursor: pointer; transition: all 0.3s ease;">我不满意</button>
                </div>
            </div>
        </div>

        <!-- 真正的惊喜过渡页面 -->
        <div id="real-surprise-page" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a0a2e, #2d1b4e); z-index: 150; justify-content: center; align-items: center; flex-direction: column;">
            <div style="color: #ff6b9d; font-size: 1.8rem; text-align: center; line-height: 2; animation: pulse 1s ease-in-out infinite;">
                真正的惊喜这才来了<br>请耐心等待
            </div>
            <div id="countdown" style="color: #ffd700; font-size: 4rem; margin-top: 2rem; font-weight: bold;">3</div>
        </div>

        <button class="open-btn" id="entry-btn" onclick="handleEntryClick()">点击打开惊喜</button>
    </div>

    <!-- 惊喜页面 -->
    <div id="surprise-page">
        <div class="content">
            <div class="greeting">生日快乐</div>
            <div class="name">索晓茹</div>
            <div class="date-info">农历二月十三 · 阳历三月十一</div>

            <div class="distance">
                <span class="city">广州</span>
                <span class="heart-line">❤️</span>
                <span class="city">石家庄</span>
            </div>

            <div class="message">
                虽然我们相隔千里，但我的心一直陪在你身边<br>
                每一天都在思念你，每一刻都想拥抱你<br>
                距离让我们的感情更加珍贵
            </div>

            <div class="message2">
                愿我的女孩永远快乐、健康、美丽<br>
                我会一直爱你，直到永远 ❤️
            </div>

            <div class="timer" id="timer">我们已经在一起 <span id="days-count">0</span> 天</div>

            <div class="button-container">
                <button class="memory-btn" onclick="openCarousel()">查看我们的回忆</button>
                <button class="letter-btn" onclick="openLetter()">我想对你说的话</button>
            </div>

            <!-- 情话轮播 -->
            <div class="love-quotes">
                <div class="quote-text" id="quote-text"></div>
                <div class="quote-dots" id="quote-dots"></div>
            </div>
        </div>

        <div class="footer">永远爱你的HAO ❤️</div>
    </div>

    <!-- 情书模态框 -->
    <div class="letter-modal" id="letter-modal">
        <div class="letter-content">
            <span class="letter-close" onclick="closeLetter()">&times;</span>
            <div class="letter-title">致我的女孩索晓茹</div>
            <div class="letter-text" id="letter-text"></div>
        </div>
    </div>

    <!-- 照片轮播模态框 -->
    <div class="carousel-modal" id="carousel-modal">
        <span class="carousel-close" onclick="closeCarousel()">&times;</span>
        <div class="carousel-title">我们的回忆</div>
        <div class="carousel-container">
            <div class="carousel-slide active">
                <img src="picture/IMG_20250712_170727.jpg" alt="回忆1">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250712_195839.jpg" alt="回忆2">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250713_104746.jpg" alt="回忆3">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250715_211040.jpg" alt="回忆4">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250715_211117.jpg" alt="回忆5">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250717_104030.jpg" alt="回忆6">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250717_175059.jpg" alt="回忆7">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250717_191630.jpg" alt="回忆8">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250718_163614.jpg" alt="回忆9">
            </div>
            <div class="carousel-slide">
                <img src="picture/IMG_20250718_164842.jpg" alt="回忆10">
            </div>

            <button class="carousel-nav carousel-prev" onclick="prevSlide()">&#10094;</button>
            <button class="carousel-nav carousel-next" onclick="nextSlide()">&#10095;</button>
        </div>

        <div class="carousel-dots" id="carousel-dots"></div>
        <div class="carousel-counter" id="carousel-counter">1 / 10</div>
    </div>

    <script>
        // 情书内容
        const letterContent = `晓茹，提笔写下这些字的时候，脑海里全是你的模样，心里满是藏不住的温柔与欢喜，想把所有细碎的心意，都慢慢说给你听。

说来也奇妙，我们初中就已是同校相识的人，明明在同一个校园里，走过同一条走廊，彼此熟悉却未曾走近，原来命运早早就为我们埋下了伏笔，等一个合适的时机，让我们从相识，走向相知、相爱。去年，经人介绍，我们终于走到了一起，2025年5月31日，这个日子我一直牢牢记在心里，那一天，我知道，我找到了那个想共度往后每一段时光的人。

还记得我第一次去你家，一时欣喜又紧张，不知不觉就喝多了，浑身发沉、脑子发懵，狼狈又笨拙。是你一直陪在我身边，没有一丝嫌弃，轻轻扶着我坐下，给我递温水、擦脸颊，耐心地照顾着我的小狼狈。那一刻，看着你温柔又认真的模样，我心里满是暖意，也更加确定，你就是那个会一直包容我、照顾我的人，这份细碎的温暖，我一直记在心底，从未忘记。

和你在一起的这些日子，每一段时光都闪闪发光。我们一起奔赴香港，看维多利亚港的灯火璀璨，吹着海风，聊着无关紧要的琐事，却觉得无比安心；我们一起漫步北京，走进雍和宫的红墙古院，感受那份宁静与虔诚，把心底的期许悄悄珍藏；也在北京，赴一场凤凰传奇的演唱会，跟着熟悉的旋律并肩合唱，把热闹与欢喜刻进回忆里；我们一起奔赴南澳岛，看蔚蓝的大海，踩柔软的沙滩，听海浪拍岸的声音，把温柔与浪漫都定格在那些瞬间。这些一起走过的路，看过的风景，经历的欢喜，都成了我心底最珍贵的回忆，往后，我还想和你去更多地方，看更多风景，赴更多欢喜，把每一个平凡的日子都过成我们喜欢的样子。

我最幸运的，莫过于遇见了善解人意的你。生活总有细碎的烦恼，工作总有不顺心的时刻，可每当我遇到问题、陷入迷茫的时候，你从不会抱怨，也不会敷衍，而是陪着我，一起分析问题，一起寻找解决的办法，一起规划我们的未来。你懂我的逞强，知我的软肋，总能在我需要的时候，给我温暖和力量，让我觉得，无论遇到什么困难，只要有你在，就什么都不用怕。

可我也知道，你并不是永远都那么坚强。你习惯了体谅别人，习惯了把委屈藏在心里，每当你受了委屈，就会默默沉默，不说话、不抱怨，可我看着你眼底的失落，看着你故作坚强的样子，心里就像被揪着一样难受。晓茹，我想告诉你，往后的日子里，不用一直憋着自己，不用什么都自己扛，我的肩膀永远为你停留，你可以委屈，可以难过，可以肆无忌惮地向我倾诉，我会一直陪着你，哄着你，护着你，不让你再受半点委屈。

马上就是你的生日了，农历二月十三，这个属于你的特别日子，我满心期待，也满心祝福。愿我的女孩，往后余生，平安喜乐，万事顺意，眼里有光，心中有爱，不用迎合任何人，不用勉强自己，永远保持这份纯粹与温柔。

晓茹，遇见你，是缘分，也是幸运；爱上你，是心动，更是坚定。从初中校园的擦肩而过，到如今的朝夕相伴，我知道，你就是我想要的未来。往后，我会好好对你，好好珍惜我们的感情，和你一起面对所有的风雨，一起奔赴更远的未来，把每一份温柔都给你，把每一份偏爱都留给你，余生漫漫，皆是你，满心欢喜，全是你。

爱你的玉豪`;

        // 情话列表
        const loveQuotes = [
            "遇见你，是缘分，也是幸运；爱上你，是心动，更是坚定",
            "我会一直爱你，直到永远",
            "我的肩膀永远为你停留",
            "余生漫漫，皆是你，满心欢喜，全是你",
            "愿我的女孩永远快乐、健康、美丽",
            "距离让我们的感情更加珍贵",
            "每一天都在思念你，每一刻都想拥抱你",
            "你是我想共度往后每一段时光的人"
        ];

        // 创建飘落的心形
        function createHearts() {
            const surprisePage = document.getElementById('surprise-page');
            const heartCount = 30;

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = (Math.random() * 10) + 's';
                heart.style.fontSize = (Math.random() * 1 + 0.8) + 'rem';
                surprisePage.appendChild(heart);
            }
        }

        // 创建星星
        function createStars() {
            const surprisePage = document.getElementById('surprise-page');
            const starCount = 50;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = (Math.random() * 3) + 's';
                surprisePage.appendChild(star);
            }
        }

        // 在一起计时器
        function initTimer() {
            const startDate = new Date('2025-05-31');
            const today = new Date();
            const diffTime = today - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('days-count').textContent = diffDays;
        }

        // 情话轮播
        let currentQuote = 0;
        let quoteInterval;

        function initQuoteCarousel() {
            const dotsContainer = document.getElementById('quote-dots');
            for (let i = 0; i < loveQuotes.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'quote-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToQuote(i);
                dotsContainer.appendChild(dot);
            }
            showQuote(0);
            startQuoteAutoPlay();
        }

        function showQuote(index) {
            const quoteText = document.getElementById('quote-text');
            const dots = document.querySelectorAll('.quote-dot');

            // 淡出
            quoteText.style.opacity = 0;

            setTimeout(() => {
                quoteText.textContent = loveQuotes[index];
                // 淡入
                quoteText.style.animation = 'none';
                quoteText.offsetHeight; // 触发重绘
                quoteText.style.animation = 'quoteFade 1s ease forwards';

                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }, 300);
        }

        function goToQuote(index) {
            currentQuote = index;
            showQuote(currentQuote);
            startQuoteAutoPlay();
        }

        function nextQuote() {
            currentQuote = (currentQuote + 1) % loveQuotes.length;
            showQuote(currentQuote);
        }

        function startQuoteAutoPlay() {
            if (quoteInterval) clearInterval(quoteInterval);
            quoteInterval = setInterval(nextQuote, 3000);
        }

        // 情书功能
        function openLetter() {
            document.getElementById('letter-text').textContent = letterContent;
            document.getElementById('letter-modal').classList.add('show');
        }

        function closeLetter() {
            document.getElementById('letter-modal').classList.remove('show');
        }

        // 情书模态框点击关闭
        document.getElementById('letter-modal').addEventListener('click', function(e) {
            if (e.target === this) closeLetter();
        });

        // 入口按钮点击处理
        let entryStep = 0;
        let zoomLevel = 0;
        function handleEntryClick() {
            const btn = document.getElementById('entry-btn');

            if (entryStep === 0) {
                // 第一次点击：显示模糊图片
                document.getElementById('photo-container').style.display = 'block';
                btn.textContent = '再点一下';
                entryStep = 1;
            } else if (entryStep === 1) {
                // 第二次点击：变清楚但还是小
                zoomLevel = 1;
                zoomPhoto();
                btn.textContent = '继续';
                entryStep = 2;
            } else if (entryStep === 2) {
                // 第三次点击：变大到最大
                zoomLevel = 2;
                zoomPhoto();
                btn.style.display = 'none';
                entryStep = 3;
                // 显示满意度询问
                setTimeout(() => {
                    document.getElementById('satisfaction-modal').style.display = 'block';
                }, 500);
            }
        }

        // 图片放大
        function zoomPhoto() {
            const photo = document.getElementById('mystery-photo');
            const hint = document.getElementById('zoom-hint');

            if (zoomLevel === 1) {
                // 变清楚但还是小
                photo.style.filter = 'blur(0px)';
                photo.style.maxWidth = '40%';
                hint.textContent = '太小了？点击变大';
            } else if (zoomLevel === 2) {
                // 变大到最大
                photo.style.filter = 'blur(0px)';
                photo.style.maxWidth = '200%';
                hint.style.display = 'none';
            }
        }

        // 满意度回答
        function answerSatisfaction(isSatisfied) {
            document.getElementById('satisfaction-modal').style.display = 'none';
            showRealSurprise();
        }

        // 显示真正的惊喜
        function showRealSurprise() {
            const realSurprise = document.getElementById('real-surprise-page');
            realSurprise.style.display = 'flex';

            let count = 3;
            const countdownEl = document.getElementById('countdown');
            countdownEl.textContent = count;

            const timer = setInterval(() => {
                count--;
                countdownEl.textContent = count;
                if (count <= 0) {
                    clearInterval(timer);
                    openSurprise();
                }
            }, 1000);
        }

        // 打开惊喜
        function openSurprise() {
            const entryPage = document.getElementById('entry-page');
            const surprisePage = document.getElementById('surprise-page');
            const realSurprise = document.getElementById('real-surprise-page');

            // 隐藏过渡页面
            if (realSurprise) realSurprise.style.display = 'none';
            entryPage.classList.add('hidden');

            setTimeout(() => {
                createHearts();
                createStars();
                surprisePage.classList.add('show');
                initTimer();
                initQuoteCarousel();
            }, 500);
        }

        // 照片轮播功能
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        const totalSlides = slides.length;
        let autoPlayInterval;

        // 初始化轮播
        function initCarousel() {
            const dotsContainer = document.getElementById('carousel-dots');
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            }
            updateCounter();
        }

        function goToSlide(index) {
            slides[currentSlide].classList.remove('active');
            document.querySelectorAll('.carousel-dot')[currentSlide].classList.remove('active');

            currentSlide = index;

            slides[currentSlide].classList.add('active');
            document.querySelectorAll('.carousel-dot')[currentSlide].classList.add('active');
            updateCounter();
        }

        function nextSlide() {
            goToSlide((currentSlide + 1) % totalSlides);
        }

        function prevSlide() {
            goToSlide((currentSlide - 1 + totalSlides) % totalSlides);
        }

        function updateCounter() {
            document.getElementById('carousel-counter').textContent = `${currentSlide + 1} / ${totalSlides}`;
        }

        function openCarousel() {
            const modal = document.getElementById('carousel-modal');
            modal.classList.add('show');
        }

        function closeCarousel() {
            const modal = document.getElementById('carousel-modal');
            modal.classList.remove('show');
            stopAutoPlay();
        }

        function startAutoPlay() {
            stopAutoPlay();
            autoPlayInterval = setInterval(nextSlide, 3000);
        }

        function stopAutoPlay() {
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('carousel-modal');
            if (!modal.classList.contains('show')) return;

            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'Escape') closeCarousel();
        });

        // 点击背景关闭
        document.getElementById('carousel-modal').addEventListener('click', function(e) {
            if (e.target === this) closeCarousel();
        });

        // 初始化
        initCarousel();
    </script>
</body>
</html>
