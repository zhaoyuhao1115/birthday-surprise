<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给索晓茹的生日惊喜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }

        /* 入口页面 */
        #entry-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 100;
            transition: opacity 1s ease, transform 1s ease;
        }

        #entry-page.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .entry-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .open-btn {
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.6);
        }

        .open-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .open-btn:hover::before {
            left: 100%;
        }

        /* 惊喜页面 */
        #surprise-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #1a0a2e 70%, #0d0015 100%);
            z-index: 50;
        }

        #surprise-page.show {
            display: flex;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 飘落的心形 */
        .heart {
            position: absolute;
            color: #ff6b9d;
            font-size: 1.5rem;
            animation: fall linear infinite;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.8);
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 星星 */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 主内容区 */
        .content {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        .greeting {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255, 182, 193, 0.8);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 182, 193, 0.6); }
            to { text-shadow: 0 0 40px rgba(255, 182, 193, 1), 0 0 60px rgba(255, 182, 193, 0.5); }
        }

        .name {
            font-size: 4rem;
            background: linear-gradient(45deg, #ff6b9d, #ffd700, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 3s ease infinite;
            margin: 1rem 0;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .date-info {
            font-size: 1.3rem;
            color: #b8c5d6;
            margin: 1.5rem 0;
        }

        .distance {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            font-size: 1.2rem;
            color: #e8d5eb;
        }

        .city {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 107, 157, 0.2);
            border: 1px solid rgba(255, 107, 157, 0.4);
            border-radius: 25px;
        }

        .heart-line {
            color: #ff6b9d;
            font-size: 1.5rem;
            animation: heartbeat 1s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .message {
            font-size: 1.4rem;
            color: #e0d4f5;
            max-width: 600px;
            line-height: 2;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 1s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message2 {
            font-size: 1.3rem;
            color: #ffd700;
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards;
            animation-delay: 2s;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .greeting {
                font-size: 2rem;
            }
            .name {
                font-size: 2.5rem;
            }
            .message {
                font-size: 1.1rem;
                padding: 0 1rem;
            }
            .entry-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 入口页面 -->
    <div id="entry-page">
        <h1 class="entry-title">一份惊喜等待着你</h1>
        <button class="open-btn" onclick="openSurprise()">点击打开惊喜</button>
    </div>

    <!-- 惊喜页面 -->
    <div id="surprise-page">
        <div class="content">
            <div class="greeting">生日快乐</div>
            <div class="name">索晓茹</div>
            <div class="date-info">农历二月十三 · 阳历三月十一</div>

            <div class="distance">
                <span class="city">石家庄</span>
                <span class="heart-line">❤️</span>
                <span class="city">广州</span>
            </div>

            <div class="message">
                虽然我们相隔千里，但我的心一直陪在你身边<br>
                每一天都在思念你，每一刻都想拥抱你<br>
                距离让我们的感情更加珍贵
            </div>

            <div class="message2">
                愿我的女孩永远快乐、健康、美丽<br>
                我会一直爱你，直到永远 ❤️
            </div>
        </div>

        <div class="footer">永远爱你的那个人 ❤️</div>
    </div>

    <script>
        // 创建飘落的心形
        function createHearts() {
            const surprisePage = document.getElementById('surprise-page');
            const heartCount = 30;

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = (Math.random() * 10) + 's';
                heart.style.fontSize = (Math.random() * 1 + 0.8) + 'rem';
                surprisePage.appendChild(heart);
            }
        }

        // 创建星星
        function createStars() {
            const surprisePage = document.getElementById('surprise-page');
            const starCount = 50;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = (Math.random() * 3) + 's';
                surprisePage.appendChild(star);
            }
        }

        // 打开惊喜
        function openSurprise() {
            const entryPage = document.getElementById('entry-page');
            const surprisePage = document.getElementById('surprise-page');

            entryPage.classList.add('hidden');

            setTimeout(() => {
                createHearts();
                createStars();
                surprisePage.classList.add('show');
            }, 500);
        }
    </script>
</body>
</html>
